<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Admin - Usuarios</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    body { background: #f4f6fb; font-family: 'Segoe UI', Arial, sans-serif; }
    .navbar { background: #1e3c72; padding: 12px 24px; box-shadow: 0 2px 12px rgba(30,60,114,0.18); }
    .navbar-brand-text { color: #fff; font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
    .navbar-brand-text i { font-size: 22px; }
    .btn-cerrar { background: rgba(255,255,255,0.12); color: #fff; border: 1px solid rgba(255,255,255,0.25); border-radius: 8px; font-size: 13px; padding: 7px 16px; display: flex; align-items: center; gap: 6px; text-decoration: none; transition: background 0.2s; }
    .btn-cerrar:hover { background: rgba(255,255,255,0.22); color: #fff; }
    .sidebar { width: 220px; min-height: calc(100vh - 56px); background: #fff; border-right: 0.5px solid #e2e8f0; padding: 24px 0; position: fixed; top: 56px; }
    .sidebar a { display: flex; align-items: center; gap: 10px; padding: 10px 24px; font-size: 14px; color: #4a5568; text-decoration: none; transition: background 0.15s; }
    .sidebar a:hover, .sidebar a.active { background: #f0f4ff; color: #1e3c72; font-weight: 500; }
    .sidebar a i { font-size: 18px; }
    .main { margin-left: 220px; padding: 32px; }
    .card-tabla { background: #fff; border-radius: 14px; border: 0.5px solid #e2e8f0; box-shadow: 0 2px 12px rgba(30,60,114,0.06); overflow: hidden; }
    .tabla-header { padding: 20px 24px; border-bottom: 0.5px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
    .badge-rol { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
    table th { font-size: 12px; color: #8a9ab5; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; border: none; padding: 12px 16px; }
    table td { font-size: 14px; color: #2d3748; padding: 12px 16px; vertical-align: middle; border-color: #f0f4f8; }
    .btn-accion { font-size: 12px; padding: 4px 12px; border-radius: 6px; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark">
  <div class="container-fluid px-0">
    <span class="navbar-brand-text"><i class="ti ti-school"></i> Sistema Académico</span>
    <div class="d-flex align-items-center gap-3">
      <span style="color:rgba(255,255,255,0.8); font-size:13px;">
        <i class="ti ti-user" style="font-size:15px; vertical-align:-2px"></i>
        <span th:text="${usuario.nombre + ' ' + usuario.apellido}"></span>
      </span>
      <a th:href="@{/logout}" class="btn-cerrar"><i class="ti ti-logout" style="font-size:15px"></i> Cerrar sesión</a>
    </div>
  </div>
</nav>

<div class="sidebar">
  <a th:href="@{/admin/inicio}"><i class="ti ti-layout-dashboard"></i> Inicio</a>
  <a th:href="@{/admin/usuarios}" class="active"><i class="ti ti-users"></i> Usuarios</a>
  <a th:href="@{/admin/materias}"><i class="ti ti-book"></i> Materias</a>
</div>

<div class="main">
  <div class="card-tabla">
    <div class="tabla-header">
      <h5 class="mb-0" style="font-weight:600; color:#1a2d5a">Usuarios registrados</h5>
      <a th:href="@{/admin/usuarios/nuevo}" class="btn btn-sm"
         style="background:#1e3c72; color:#fff; border-radius:8px; font-size:13px;">
        <i class="ti ti-plus" style="font-size:14px; vertical-align:-2px"></i> Nuevo usuario
      </a>
    </div>
    <table class="table mb-0">
      <thead style="background:#f7f9fc">
        <tr>
          <th>#</th>
          <th>Nombre</th>
          <th>Cédula</th>
          <th>Correo</th>
          <th>Username</th>
          <th>Rol</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="u : ${usuarios}">
          <td th:text="${u.idUsuario}"></td>
          <td>
            <span th:text="${u.nombre + ' ' + u.apellido}"
                  th:style="${u.activo ? '' : 'color:#aaa; text-decoration:line-through'}"></span>
          </td>
          <td th:text="${u.cedula}"></td>
          <td th:text="${u.correo}"></td>
          <td th:text="${u.username}"></td>
          <td>
            <span th:if="${u.rol == 'ADMIN'}"      class="badge-rol" style="background:#e8f0fe; color:#1e3c72">Admin</span>
            <span th:if="${u.rol == 'DOCENTE'}"    class="badge-rol" style="background:#e8f5e9; color:#2e7d32">Docente</span>
            <span th:if="${u.rol == 'ESTUDIANTE'}" class="badge-rol" style="background:#fff3e0; color:#e65100">Estudiante</span>
          </td>
          <td>
            <span th:if="${u.activo}" class="badge-rol" style="background:#e8f5e9; color:#2e7d32">
              <i class="ti ti-circle-check" style="font-size:12px; vertical-align:-1px"></i> Activo
            </span>
            <span th:if="${!u.activo}" class="badge-rol" style="background:#fff0f0; color:#c0392b">
              <i class="ti ti-circle-x" style="font-size:12px; vertical-align:-1px"></i> Inactivo
            </span>
          </td>
          <td>
            <div class="d-flex gap-1 flex-wrap">
              <a th:href="@{/admin/usuarios/editar/{id}(id=${u.idUsuario})}"
                 class="btn btn-sm btn-outline-primary btn-accion">
                <i class="ti ti-edit" style="font-size:13px"></i> Editar
              </a>

              <a th:if="${u.rol == 'DOCENTE'}"
                 th:href="@{/admin/docente/__${docenteRepository.findByUsuario(u).get().idDocente}__/materias}"
                 class="btn btn-sm btn-outline-success btn-accion">
                <i class="ti ti-book" style="font-size:13px"></i> Materias
              </a>

              <a th:if="${u.rol == 'ESTUDIANTE'}"
                 th:href="@{/admin/estudiante/__${estudianteRepository.findByUsuario(u).get().idEstudiante}__/materias}"
                 class="btn btn-sm btn-outline-warning btn-accion">
                <i class="ti ti-book" style="font-size:13px"></i> Matricular
              </a>

              <a th:if="${u.activo}"
                 th:href="@{/admin/usuarios/desactivar/{id}(id=${u.idUsuario})}"
                 class="btn btn-sm btn-outline-danger btn-accion"
                 onclick="return confirm('¿Desactivar este usuario?')">
                <i class="ti ti-user-off" style="font-size:13px"></i> Desactivar
              </a>

              <a th:if="${!u.activo}"
                 th:href="@{/admin/usuarios/activar/{id}(id=${u.idUsuario})}"
                 class="btn btn-sm btn-outline-success btn-accion"
                 onclick="return confirm('¿Activar este usuario?')">
                <i class="ti ti-user-check" style="font-size:13px"></i> Activar
              </a>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

</body>
</html>
