<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Admin - Usuario</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    body { background: #f4f6fb; font-family: 'Segoe UI', Arial, sans-serif; }
    .navbar { background: #1e3c72; padding: 12px 24px; box-shadow: 0 2px 12px rgba(30,60,114,0.18); }
    .navbar-brand-text { color: #fff; font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
    .navbar-brand-text i { font-size: 22px; }
    .btn-cerrar { background: rgba(255,255,255,0.12); color: #fff; border: 1px solid rgba(255,255,255,0.25); border-radius: 8px; font-size: 13px; padding: 7px 16px; display: flex; align-items: center; gap: 6px; text-decoration: none; }
    .sidebar { width: 220px; min-height: calc(100vh - 56px); background: #fff; border-right: 0.5px solid #e2e8f0; padding: 24px 0; position: fixed; top: 56px; }
    .sidebar a { display: flex; align-items: center; gap: 10px; padding: 10px 24px; font-size: 14px; color: #4a5568; text-decoration: none; transition: background 0.15s; }
    .sidebar a:hover, .sidebar a.active { background: #f0f4ff; color: #1e3c72; font-weight: 500; }
    .sidebar a i { font-size: 18px; }
    .main { margin-left: 220px; padding: 32px; }
    .card-form { background: #fff; border-radius: 14px; padding: 32px; border: 0.5px solid #e2e8f0; box-shadow: 0 2px 12px rgba(30,60,114,0.06); max-width: 600px; }
    .form-label { font-size: 13px; font-weight: 500; color: #4a5568; }
    .form-control, .form-select { font-size: 14px; border-color: #dde2ec; background: #f7f9fc; }
    .form-control:focus, .form-select:focus { border-color: #2a5298; box-shadow: 0 0 0 3px rgba(42,82,152,0.12); background: #fff; }
    #camposEstudiante { display: none; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark">
  <div class="container-fluid px-0">
    <span class="navbar-brand-text"><i class="ti ti-school"></i> Sistema Académico</span>
    <a th:href="@{/logout}" class="btn-cerrar"><i class="ti ti-logout" style="font-size:15px"></i> Cerrar sesión</a>
  </div>
</nav>

<div class="sidebar">
  <a th:href="@{/admin/inicio}"><i class="ti ti-layout-dashboard"></i> Inicio</a>
  <a th:href="@{/admin/usuarios}" class="active"><i class="ti ti-users"></i> Usuarios</a>
  <a th:href="@{/admin/materias}"><i class="ti ti-book"></i> Materias</a>
</div>

<div class="main">
  <div class="card-form">
    <h5 class="mb-3" style="font-weight:600; color:#1a2d5a">
      <span th:if="${nuevoUsuario.idUsuario == null}">Nuevo usuario</span>
      <span th:if="${nuevoUsuario.idUsuario != null}">Editar usuario</span>
    </h5>

    <!-- Mensaje de error validación -->
    <div th:if="${error}" class="alert d-flex align-items-center gap-2 mb-3"
         style="background:#fff0f0; border:1px solid #ffcccc; color:#c0392b; border-radius:10px; font-size:13px; padding:10px 14px;">
      <i class="ti ti-alert-circle" style="font-size:16px"></i>
      <span th:text="${error}"></span>
    </div>

    <form th:action="@{/admin/usuarios/guardar}" th:object="${nuevoUsuario}" method="post">
      <input type="hidden" th:field="*{idUsuario}">

      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Nombre</label>
          <input type="text" th:field="*{nombre}" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Apellido</label>
          <input type="text" th:field="*{apellido}" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Cédula</label>
          <input type="text" th:field="*{cedula}" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Correo</label>
          <input type="email" th:field="*{correo}" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Username</label>
          <input type="text" th:field="*{username}" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">
            Contraseña
            <span th:if="${nuevoUsuario.idUsuario != null}"
                  style="font-size:11px; color:#8a9ab5; font-weight:400;">
              (dejar vacío para mantener la actual)
            </span>
          </label>
          <input type="password"
                 th:field="*{password}"
                 class="form-control"
                 th:placeholder="${nuevoUsuario.idUsuario != null ? 'Sin cambios' : 'Ingrese contraseña'}"
                 th:required="${nuevoUsuario.idUsuario == null}">
        </div>
        <div class="col-12">
          <label class="form-label">Rol</label>
          <select th:field="*{rol}" class="form-select" id="selectRol" onchange="toggleEstudiante()" required>
            <option value="">Seleccione un rol</option>
            <option value="ADMIN">Administrador</option>
            <option value="DOCENTE">Docente</option>
            <option value="ESTUDIANTE">Estudiante</option>
          </select>
        </div>

        <div class="col-12" id="camposEstudiante">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Carrera</label>
              <select name="idCarrera" class="form-select">
                <option value="">Seleccione carrera</option>
                <option th:each="c : ${carreras}"
                        th:value="${c.idCarrera}"
                        th:text="${c.nombreCarrera}"></option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Semestre</label>
              <select name="idSemestre" class="form-select">
                <option value="">Seleccione semestre</option>
                <option th:each="s : ${semestres}"
                        th:value="${s.idSemestre}"
                        th:text="${s.numeroSemestre}"></option>
              </select>
            </div>
          </div>
        </div>

        <div class="col-12 d-flex gap-2 mt-2">
          <button type="submit" class="btn" style="background:#1e3c72; color:#fff; border-radius:8px; font-size:14px;">
            <i class="ti ti-device-floppy" style="font-size:15px; vertical-align:-2px; margin-right:4px"></i> Guardar
          </button>
          <a th:href="@{/admin/usuarios}" class="btn btn-outline-secondary" style="border-radius:8px; font-size:14px;">
            Cancelar
          </a>
        </div>
      </div>
    </form>
  </div>
</div>

<script>
  function toggleEstudiante() {
    const rol = document.getElementById('selectRol').value;
    document.getElementById('camposEstudiante').style.display = rol === 'ESTUDIANTE' ? 'block' : 'none';
  }
  toggleEstudiante();
</script>

</body>
</html>
