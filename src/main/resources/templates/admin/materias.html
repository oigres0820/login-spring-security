<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Admin - Materias</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    body { background: #f4f6fb; font-family: 'Segoe UI', Arial, sans-serif; }
    .navbar { background: #1e3c72; padding: 12px 24px; box-shadow: 0 2px 12px rgba(30,60,114,0.18); }
    .navbar-brand-text { color: #fff; font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
    .navbar-brand-text i { font-size: 22px; }
    .btn-cerrar { background: rgba(255,255,255,0.12); color: #fff; border: 1px solid rgba(255,255,255,0.25); border-radius: 8px; font-size: 13px; padding: 7px 16px; display: flex; align-items: center; gap: 6px; text-decoration: none; }
    .sidebar { width: 220px; min-height: calc(100vh - 56px); background: #fff; border-right: 0.5px solid #e2e8f0; padding: 24px 0; position: fixed; top: 56px; }
    .sidebar a { display: flex; align-items: center; gap: 10px; padding: 10px 24px; font-size: 14px; color: #4a5568; text-decoration: none; transition: background 0.15s; }
    .sidebar a:hover, .sidebar a.active { background: #f0f4ff; color: #1e3c72; font-weight: 500; }
    .sidebar a i { font-size: 18px; }
    .main { margin-left: 220px; padding: 32px; }
    .card-tabla { background: #fff; border-radius: 14px; border: 0.5px solid #e2e8f0; box-shadow: 0 2px 12px rgba(30,60,114,0.06); overflow: hidden; }
    .tabla-header { padding: 20px 24px; border-bottom: 0.5px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
    table th { font-size: 12px; color: #8a9ab5; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; border: none; padding: 12px 16px; }
    table td { font-size: 14px; color: #2d3748; padding: 12px 16px; vertical-align: middle; border-color: #f0f4f8; }
    .btn-accion { font-size: 12px; padding: 4px 12px; border-radius: 6px; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark">
  <div class="container-fluid px-0">
    <span class="navbar-brand-text"><i class="ti ti-school"></i> Sistema Académico</span>
    <a th:href="@{/logout}" class="btn-cerrar"><i class="ti ti-logout" style="font-size:15px"></i> Cerrar sesión</a>
  </div>
</nav>

<div class="sidebar">
  <a th:href="@{/admin/inicio}"><i class="ti ti-layout-dashboard"></i> Inicio</a>
  <a th:href="@{/admin/usuarios}"><i class="ti ti-users"></i> Usuarios</a>
  <a th:href="@{/admin/materias}" class="active"><i class="ti ti-book"></i> Materias</a>
</div>

<div class="main">
  <div class="card-tabla">
    <div class="tabla-header">
      <h5 class="mb-0" style="font-weight:600; color:#1a2d5a">Materias registradas</h5>
      <a th:href="@{/admin/materias/nueva}" class="btn btn-sm" style="background:#1e3c72; color:#fff; border-radius:8px; font-size:13px;">
        <i class="ti ti-plus" style="font-size:14px; vertical-align:-2px"></i> Nueva materia
      </a>
    </div>
    <table class="table mb-0">
      <thead style="background:#f7f9fc">
        <tr>
          <th>#</th>
          <th>Materia</th>
          <th>Carrera</th>
          <th>Semestre</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="m : ${materias}">
          <td th:text="${m.idMateria}"></td>
          <td th:text="${m.nombreMateria}"></td>
          <td th:text="${m.carrera.nombreCarrera}"></td>
          <td th:text="${m.semestre.numeroSemestre}"></td>
          <td>
            <a th:href="@{/admin/materias/editar/{id}(id=${m.idMateria})}" class="btn btn-sm btn-outline-primary btn-accion">
              <i class="ti ti-edit" style="font-size:13px"></i> Editar
            </a>
            <a th:href="@{/admin/materias/eliminar/{id}(id=${m.idMateria})}" class="btn btn-sm btn-outline-danger btn-accion"
               onclick="return confirm('¿Eliminar esta materia?')">
              <i class="ti ti-trash" style="font-size:13px"></i> Eliminar
            </a>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

</body>
</html>
