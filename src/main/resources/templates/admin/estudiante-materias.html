<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Admin - Matricular Estudiante</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    body { background: #f4f6fb; font-family: 'Segoe UI', Arial, sans-serif; }
    .navbar { background: #1e3c72; padding: 12px 24px; box-shadow: 0 2px 12px rgba(30,60,114,0.18); }
    .navbar-brand-text { color: #fff; font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
    .navbar-brand-text i { font-size: 22px; }
    .btn-cerrar { background: rgba(255,255,255,0.12); color: #fff; border: 1px solid rgba(255,255,255,0.25); border-radius: 8px; font-size: 13px; padding: 7px 16px; display: flex; align-items: center; gap: 6px; text-decoration: none; }
    .sidebar { width: 220px; min-height: calc(100vh - 56px); background: #fff; border-right: 0.5px solid #e2e8f0; padding: 24px 0; position: fixed; top: 56px; }
    .sidebar a { display: flex; align-items: center; gap: 10px; padding: 10px 24px; font-size: 14px; color: #4a5568; text-decoration: none; transition: background 0.15s; }
    .sidebar a:hover, .sidebar a.active { background: #f0f4ff; color: #1e3c72; font-weight: 500; }
    .sidebar a i { font-size: 18px; }
    .main { margin-left: 220px; padding: 32px; }
    .card-form { background: #fff; border-radius: 14px; padding: 32px; border: 0.5px solid #e2e8f0; box-shadow: 0 2px 12px rgba(30,60,114,0.06); max-width: 700px; }
    .materia-item { background: #f7f9fc; border-radius: 10px; padding: 12px 16px; border: 0.5px solid #e2e8f0; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: background 0.15s; }
    .materia-item:hover { background: #fff3e0; }
    .materia-item input[type="checkbox"] { width: 16px; height: 16px; accent-color: #e65100; flex-shrink: 0; }
    .badge-carrera { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: #e8f0fe; color: #1e3c72; font-weight: 500; }
    .badge-semestre { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: #fff3e0; color: #e65100; font-weight: 500; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark">
  <div class="container-fluid px-0">
    <span class="navbar-brand-text"><i class="ti ti-school"></i> Sistema Académico</span>
    <a th:href="@{/logout}" class="btn-cerrar"><i class="ti ti-logout" style="font-size:15px"></i> Cerrar sesión</a>
  </div>
</nav>

<div class="sidebar">
  <a th:href="@{/admin/inicio}"><i class="ti ti-layout-dashboard"></i> Inicio</a>
  <a th:href="@{/admin/usuarios}" class="active"><i class="ti ti-users"></i> Usuarios</a>
  <a th:href="@{/admin/materias}"><i class="ti ti-book"></i> Materias</a>
</div>

<div class="main">
  <div class="d-flex align-items-center gap-2 mb-4">
    <a th:href="@{/admin/usuarios}" style="color:#8a9ab5; text-decoration:none; font-size:13px;">
      <i class="ti ti-arrow-left" style="font-size:15px; vertical-align:-2px"></i> Volver
    </a>
    <span style="color:#dde2ec">/</span>
    <span style="font-size:13px; color:#1a2d5a; font-weight:500"
          th:text="${estudiante.usuario.nombre + ' ' + estudiante.usuario.apellido}"></span>
  </div>

  <div class="card-form">
    <h5 class="mb-1" style="font-weight:600; color:#1a2d5a">Matricular estudiante en materias</h5>
    <p class="text-muted mb-4" style="font-size:13px"
       th:text="${estudiante.usuario.nombre + ' ' + estudiante.usuario.apellido
                 + ' · ' + estudiante.carrera.nombreCarrera
                 + ' · Semestre ' + estudiante.semestre.numeroSemestre}"></p>

    <form th:action="@{/admin/estudiante/{id}/materias/guardar(id=${estudiante.idEstudiante})}" method="post">
      <div class="row g-2 mb-4">
        <div class="col-md-6" th:each="m : ${todasLasMaterias}">
          <label class="materia-item">
            <input type="checkbox" name="idMaterias" th:value="${m.idMateria}"
                   th:checked="${estudiante.materias.contains(m)}">
            <div>
              <p class="mb-1" style="font-size:14px; font-weight:500; color:#1a2d5a"
                 th:text="${m.nombreMateria}"></p>
              <div class="d-flex gap-1">
                <span class="badge-carrera" th:text="${m.carrera.nombreCarrera}"></span>
                <span class="badge-semestre" th:text="'Sem. ' + ${m.semestre.numeroSemestre}"></span>
              </div>
            </div>
          </label>
        </div>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn" style="background:#e65100; color:#fff; border-radius:8px; font-size:14px;">
          <i class="ti ti-device-floppy" style="font-size:15px; vertical-align:-2px; margin-right:4px"></i> Guardar
        </button>
        <a th:href="@{/admin/usuarios}" class="btn btn-outline-secondary" style="border-radius:8px; font-size:14px;">
          Cancelar
        </a>
      </div>
    </form>
  </div>
</div>

</body>
</html>
