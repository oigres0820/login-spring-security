<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Inicio - Sistema Académico</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    body {
      background: #f4f6fb;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    .navbar {
      background: #1e3c72;
      padding: 12px 24px;
      box-shadow: 0 2px 12px rgba(30, 60, 114, 0.18);
    }

    .navbar-brand-text {
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .navbar-brand-text i { font-size: 22px; }

    .btn-cerrar {
      background: rgba(255,255,255,0.12);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 8px;
      font-size: 13px;
      padding: 7px 16px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s;
      text-decoration: none;
    }

    .btn-cerrar:hover {
      background: rgba(255,255,255,0.22);
      color: #fff;
    }

    .contenedor {
      margin-top: 40px;
      margin-bottom: 40px;
    }

    .card-bienvenida {
      border: 0.5px solid #e2e8f0;
      border-radius: 18px;
      padding: 36px 40px;
      background: #fff;
      box-shadow: 0 4px 24px rgba(30, 60, 114, 0.08);
    }

    .avatar-circle {
      width: 56px;
      height: 56px;
      background: #e8f0fe;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 600;
      color: #1e3c72;
      flex-shrink: 0;
    }

    .badge-tech {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 20px;
      margin: 4px 4px 4px 0;
    }

    .card-stat {
      background: #f7f9fc;
      border-radius: 12px;
      padding: 16px 20px;
      border: 0.5px solid #e2e8f0;
    }

    .card-stat .label {
      font-size: 12px;
      color: #8a9ab5;
      margin-bottom: 4px;
    }

    .card-stat .valor {
      font-size: 15px;
      font-weight: 600;
      color: #1a2d5a;
      margin: 0;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-dark">
  <div class="container-fluid px-0">
    <span class="navbar-brand-text">
      <i class="ti ti-school"></i>
      Sistema Académico
    </span>
    <a th:href="@{/logout}" class="btn-cerrar">
      <i class="ti ti-logout" style="font-size:15px"></i>
      Cerrar sesión
    </a>
  </div>
</nav>

<div class="container contenedor">
  <div class="card card-bienvenida">

    <div class="d-flex align-items-center gap-3 mb-3">
      <div class="avatar-circle">
        <span th:text="${#strings.toUpperCase(#strings.substring(usuario.nombre,0,1))}
                      + ${#strings.toUpperCase(#strings.substring(usuario.apellido,0,1))}">US</span>
      </div>
      <div>
        <h1 class="mb-1" style="font-size:24px; font-weight:600; color:#1a2d5a">
          ¡Bienvenido, <span th:text="${usuario.nombre + ' ' + usuario.apellido}">Usuario</span>!
        </h1>
        <p class="mb-0" style="font-size:13px; color:#8a9ab5"
           th:text="${#authentication.name}">username</p>
      </div>
    </div>

    <p class="text-muted mb-4" style="font-size:14px">
      Inicio de sesión exitoso usando Spring Security y Thymeleaf.
    </p>

    <hr class="my-4" style="border-color:#e8edf5">

    <p class="mb-2" style="font-size:13px; font-weight:500; color:#4a5568">
      Tecnologías del proyecto
    </p>

    <div class="mb-4">
      <span class="badge-tech" style="background:#e8f0fe; color:#1e3c72">
        <i class="ti ti-brand-java" style="font-size:14px"></i> Spring Boot
      </span>
      <span class="badge-tech" style="background:#e8f5e9; color:#2e7d32">
        <i class="ti ti-shield-check" style="font-size:14px"></i> Spring Security
      </span>
      <span class="badge-tech" style="background:#fff3e0; color:#e65100">
        <i class="ti ti-template" style="font-size:14px"></i> Thymeleaf
      </span>
      <span class="badge-tech" style="background:#f3e8ff; color:#6a1b9a">
        <i class="ti ti-database" style="font-size:14px"></i> MySQL
      </span>
      <span class="badge-tech" style="background:#e3f2fd; color:#0d47a1">
        <i class="ti ti-brand-bootstrap" style="font-size:14px"></i> Bootstrap 5
      </span>
    </div>

    <div class="row g-3">
      <div class="col-md-3 col-6">
        <div class="card-stat">
          <p class="label">Estado de sesión</p>
          <p class="valor" style="color:#2e7d32">
            <i class="ti ti-circle-check" style="font-size:15px; vertical-align:-2px"></i>
            Activa
          </p>
        </div>
      </div>
      <div class="col-md-3 col-6">
        <div class="card-stat">
          <p class="label">Usuario</p>
          <p class="valor" th:text="${#authentication.name}">username</p>
        </div>
      </div>
    </div>

  </div>
</div>

</body>
</html>
