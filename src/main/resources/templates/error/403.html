<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Acceso denegado</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    body {
      background: #1e3c72;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    .error-card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      text-align: center;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    .error-icon {
      width: 72px;
      height: 72px;
      background: #fff0f0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }
    .error-icon i { font-size: 36px; color: #c0392b; }
    .error-code { font-size: 64px; font-weight: 700; color: #1a2d5a; margin: 0; line-height: 1; }
    .error-titulo { font-size: 18px; font-weight: 600; color: #1a2d5a; margin: 12px 0 8px; }
    .error-desc { font-size: 14px; color: #8a9ab5; margin-bottom: 28px; }
    .btn-volver {
      background: #1e3c72;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 11px 28px;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s;
    }
    .btn-volver:hover { background: #2a5298; color: #fff; }
  </style>
</head>
<body>
  <div class="error-card">
    <div class="error-icon">
      <i class="ti ti-shield-off"></i>
    </div>
    <p class="error-code">403</p>
    <p class="error-titulo">Acceso denegado</p>
    <p class="error-desc">No tienes permisos para acceder a esta página. Verifica que estés usando el perfil correcto.</p>
    <a th:href="@{/login}" class="btn-volver">
      <i class="ti ti-arrow-left" style="font-size:15px"></i>
      Volver al inicio
    </a>
  </div>
</body>
</html>
