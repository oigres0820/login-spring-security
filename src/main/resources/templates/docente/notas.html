<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Docente - Notas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    body { background: #f4f6fb; font-family: 'Segoe UI', Arial, sans-serif; }
    .navbar { background: #2e7d32; padding: 12px 24px; box-shadow: 0 2px 12px rgba(46,125,50,0.18); }
    .navbar-brand-text { color: #fff; font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
    .navbar-brand-text i { font-size: 22px; }
    .btn-cerrar { background: rgba(255,255,255,0.12); color: #fff; border: 1px solid rgba(255,255,255,0.25); border-radius: 8px; font-size: 13px; padding: 7px 16px; display: flex; align-items: center; gap: 6px; text-decoration: none; }
    .sidebar { width: 220px; min-height: calc(100vh - 56px); background: #fff; border-right: 0.5px solid #e2e8f0; padding: 24px 0; position: fixed; top: 56px; }
    .sidebar a { display: flex; align-items: center; gap: 10px; padding: 10px 24px; font-size: 14px; color: #4a5568; text-decoration: none; transition: background 0.15s; }
    .sidebar a:hover { background: #f0fff4; color: #2e7d32; font-weight: 500; }
    .sidebar a i { font-size: 18px; }
    .main { margin-left: 220px; padding: 32px; }
    .card-notas { background: #fff; border-radius: 14px; padding: 28px; border: 0.5px solid #e2e8f0; box-shadow: 0 2px 12px rgba(46,125,50,0.06); margin-bottom: 20px; }
    .corte-titulo { font-size: 14px; font-weight: 600; color: #1a2d5a; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .corte-badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; background: #e8f5e9; color: #2e7d32; }
    .form-label { font-size: 12px; font-weight: 500; color: #4a5568; margin-bottom: 4px; }
    .form-control { font-size: 14px; border-color: #dde2ec; background: #f7f9fc; }
    .form-control:focus { border-color: #2e7d32; box-shadow: 0 0 0 3px rgba(46,125,50,0.12); background: #fff; }
    .definitiva-box { background: #f0fff4; border-radius: 10px; padding: 12px 16px; border: 0.5px solid #b2dfdb; display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
    .definitiva-box span { font-size: 13px; color: #2e7d32; font-weight: 500; }
    .definitiva-box strong { font-size: 18px; color: #1b5e20; }
    .info-estudiante { background: #f7f9fc; border-radius: 12px; padding: 16px 20px; border: 0.5px solid #e2e8f0; margin-bottom: 24px; display: flex; gap: 24px; flex-wrap: wrap; }
    .info-item .label { font-size: 11px; color: #8a9ab5; margin-bottom: 2px; }
    .info-item .valor { font-size: 14px; font-weight: 500; color: #1a2d5a; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark">
  <div class="container-fluid px-0">
    <span class="navbar-brand-text"><i class="ti ti-school"></i> Sistema Académico</span>
    <a th:href="@{/logout}" class="btn-cerrar"><i class="ti ti-logout" style="font-size:15px"></i> Cerrar sesión</a>
  </div>
</nav>

<div class="sidebar">
  <a th:href="@{/docente/inicio}"><i class="ti ti-layout-dashboard"></i> Inicio</a>
</div>

<div class="main">

  <div class="d-flex align-items-center gap-2 mb-4">
    <a th:href="@{/docente/materia/{id}/estudiantes(id=${materia.idMateria})}"
       style="color:#8a9ab5; text-decoration:none; font-size:13px;">
      <i class="ti ti-arrow-left" style="font-size:15px; vertical-align:-2px"></i> Volver
    </a>
    <span style="color:#dde2ec">/</span>
    <span style="font-size:13px; color:#1a2d5a; font-weight:500"
          th:text="${estudiante.usuario.nombre + ' ' + estudiante.usuario.apellido}"></span>
  </div>

  <!-- Info del estudiante -->
  <div class="info-estudiante">
    <div class="info-item">
      <p class="label">Estudiante</p>
      <p class="valor" th:text="${estudiante.usuario.nombre + ' ' + estudiante.usuario.apellido}"></p>
    </div>
    <div class="info-item">
      <p class="label">Materia</p>
      <p class="valor" th:text="${materia.nombreMateria}"></p>
    </div>
    <div class="info-item">
      <p class="label">Carrera</p>
      <p class="valor" th:text="${materia.carrera.nombreCarrera}"></p>
    </div>
    <div class="info-item">
      <p class="label">Semestre</p>
      <p class="valor" th:text="${materia.semestre.numeroSemestre}"></p>
    </div>
  </div>

  <form th:action="@{/docente/materia/{idM}/estudiante/{idE}/notas/guardar(idM=${materia.idMateria}, idE=${estudiante.idEstudiante})}"
        method="post">

    <!-- CORTE 1 -->
    <div class="card-notas">
      <div class="corte-titulo">
        <i class="ti ti-clipboard-list" style="font-size:16px; color:#2e7d32"></i>
        Corte 1 <span class="corte-badge">33%</span>
      </div>
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label">Parcial (60%)</label>
          <input type="number" name="parcial1" class="form-control" min="0" max="5" step="0.1"
                 th:value="${corte1.parcial != null ? corte1.parcial : 0}" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">Actividades (30%)</label>
          <input type="number" name="actividades1" class="form-control" min="0" max="5" step="0.1"
                 th:value="${corte1.actividades != null ? corte1.actividades : 0}" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">Autoevaluación (10%)</label>
          <input type="number" name="auto1" class="form-control" min="0" max="5" step="0.1"
                 th:value="${corte1.autoevaluacion != null ? corte1.autoevaluacion : 0}" required>
        </div>
      </div>
      <div class="definitiva-box">
        <span>Definitiva Corte 1</span>
        <strong th:text="${corte1.definitiva != null ? corte1.definitiva : '—'}"></strong>
      </div>
    </div>

    <!-- CORTE 2 -->
    <div class="card-notas">
      <div class="corte-titulo">
        <i class="ti ti-clipboard-list" style="font-size:16px; color:#2e7d32"></i>
        Corte 2 <span class="corte-badge">33%</span>
      </div>
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label">Parcial (60%)</label>
          <input type="number" name="parcial2" class="form-control" min="0" max="5" step="0.1"
                 th:value="${corte2.parcial != null ? corte2.parcial : 0}" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">Actividades (30%)</label>
          <input type="number" name="actividades2" class="form-control" min="0" max="5" step="0.1"
                 th:value="${corte2.actividades != null ? corte2.actividades : 0}" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">Autoevaluación (10%)</label>
          <input type="number" name="auto2" class="form-control" min="0" max="5" step="0.1"
                 th:value="${corte2.autoevaluacion != null ? corte2.autoevaluacion : 0}" required>
        </div>
      </div>
      <div class="definitiva-box">
        <span>Definitiva Corte 2</span>
        <strong th:text="${corte2.definitiva != null ? corte2.definitiva : '—'}"></strong>
      </div>
    </div>

    <!-- CORTE 3 -->
    <div class="card-notas">
      <div class="corte-titulo">
        <i class="ti ti-clipboard-list" style="font-size:16px; color:#2e7d32"></i>
        Corte 3 <span class="corte-badge">34%</span>
      </div>
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label">Parcial (60%)</label>
          <input type="number" name="parcial3" class="form-control" min="0" max="5" step="0.1"
                 th:value="${corte3.parcial != null ? corte3.parcial : 0}" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">Actividades (30%)</label>
          <input type="number" name="actividades3" class="form-control" min="0" max="5" step="0.1"
                 th:value="${corte3.actividades != null ? corte3.actividades : 0}" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">Autoevaluación (10%)</label>
          <input type="number" name="auto3" class="form-control" min="0" max="5" step="0.1"
                 th:value="${corte3.autoevaluacion != null ? corte3.autoevaluacion : 0}" required>
        </div>
      </div>
      <div class="definitiva-box">
        <span>Definitiva Corte 3</span>
        <strong th:text="${corte3.definitiva != null ? corte3.definitiva : '—'}"></strong>
      </div>
    </div>

    <button type="submit" class="btn" style="background:#2e7d32; color:#fff; border-radius:10px; padding:11px 28px; font-size:15px; font-weight:500;">
      <i class="ti ti-device-floppy" style="font-size:16px; vertical-align:-2px; margin-right:6px"></i>
      Guardar notas
    </button>

  </form>
</div>

</body>
</html>
