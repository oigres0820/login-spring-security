<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Docente - Estudiantes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    body { background: #f4f6fb; font-family: 'Segoe UI', Arial, sans-serif; }
    .navbar { background: #2e7d32; padding: 12px 24px; box-shadow: 0 2px 12px rgba(46,125,50,0.18); }
    .navbar-brand-text { color: #fff; font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
    .navbar-brand-text i { font-size: 22px; }
    .btn-cerrar { background: rgba(255,255,255,0.12); color: #fff; border: 1px solid rgba(255,255,255,0.25); border-radius: 8px; font-size: 13px; padding: 7px 16px; display: flex; align-items: center; gap: 6px; text-decoration: none; }
    .sidebar { width: 220px; min-height: calc(100vh - 56px); background: #fff; border-right: 0.5px solid #e2e8f0; padding: 24px 0; position: fixed; top: 56px; }
    .sidebar a { display: flex; align-items: center; gap: 10px; padding: 10px 24px; font-size: 14px; color: #4a5568; text-decoration: none; transition: background 0.15s; }
    .sidebar a:hover, .sidebar a.active { background: #f0fff4; color: #2e7d32; font-weight: 500; }
    .sidebar a i { font-size: 18px; }
    .main { margin-left: 220px; padding: 32px; }
    .card-tabla { background: #fff; border-radius: 14px; border: 0.5px solid #e2e8f0; box-shadow: 0 2px 12px rgba(46,125,50,0.06); overflow: hidden; }
    .tabla-header { padding: 20px 24px; border-bottom: 0.5px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
    table th { font-size: 12px; color: #8a9ab5; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; border: none; padding: 12px 16px; }
    table td { font-size: 14px; color: #2d3748; padding: 12px 16px; vertical-align: middle; border-color: #f0f4f8; }
    .btn-accion { font-size: 12px; padding: 4px 12px; border-radius: 6px; }
    .avatar-circle { width: 34px; height: 34px; background: #e8f5e9; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: #2e7d32; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark">
  <div class="container-fluid px-0">
    <span class="navbar-brand-text"><i class="ti ti-school"></i> Sistema Académico</span>
    <a th:href="@{/logout}" class="btn-cerrar"><i class="ti ti-logout" style="font-size:15px"></i> Cerrar sesión</a>
  </div>
</nav>

<div class="sidebar">
  <a th:href="@{/docente/inicio}"><i class="ti ti-layout-dashboard"></i> Inicio</a>
</div>

<div class="main">
  <div class="d-flex align-items-center gap-2 mb-4">
    <a th:href="@{/docente/inicio}" style="color:#8a9ab5; text-decoration:none; font-size:13px;">
      <i class="ti ti-arrow-left" style="font-size:15px; vertical-align:-2px"></i> Volver
    </a>
    <span style="color:#dde2ec">/</span>
    <span style="font-size:13px; color:#1a2d5a; font-weight:500" th:text="${materia.nombreMateria}"></span>
  </div>

  <div class="card-tabla">
    <div class="tabla-header">
      <div>
        <h5 class="mb-0" style="font-weight:600; color:#1a2d5a" th:text="${materia.nombreMateria}"></h5>
        <span style="font-size:13px; color:#8a9ab5" th:text="${materia.carrera.nombreCarrera + ' · Semestre ' + materia.semestre.numeroSemestre}"></span>
      </div>
    </div>
    <table class="table mb-0">
      <thead style="background:#f7f9fc">
        <tr>
          <th>Estudiante</th>
          <th>Cédula</th>
          <th>Carrera</th>
          <th>Semestre</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="e : ${estudiantes}">
          <td>
            <div class="d-flex align-items-center gap-2">
              <div class="avatar-circle">
                <span th:text="${#strings.toUpperCase(#strings.substring(e.usuario.nombre,0,1))}
                              + ${#strings.toUpperCase(#strings.substring(e.usuario.apellido,0,1))}"></span>
              </div>
              <span th:text="${e.usuario.nombre + ' ' + e.usuario.apellido}"></span>
            </div>
          </td>
          <td th:text="${e.usuario.cedula}"></td>
          <td th:text="${e.carrera.nombreCarrera}"></td>
          <td th:text="${e.semestre.numeroSemestre}"></td>
          <td>
            <a th:href="@{/docente/materia/{idM}/estudiante/{idE}/notas(idM=${materia.idMateria}, idE=${e.idEstudiante})}"
               class="btn btn-sm btn-accion" style="background:#2e7d32; color:#fff;">
              <i class="ti ti-pencil" style="font-size:13px"></i> Registrar notas
            </a>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(estudiantes)}">
          <td colspan="5" class="text-center text-muted py-4">No hay estudiantes matriculados en esta materia.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

</body>
</html>
