<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Docente - Inicio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    body { background: #f4f6fb; font-family: 'Segoe UI', Arial, sans-serif; }
    .navbar { background: #2e7d32; padding: 12px 24px; box-shadow: 0 2px 12px rgba(46,125,50,0.18); }
    .navbar-brand-text { color: #fff; font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
    .navbar-brand-text i { font-size: 22px; }
    .btn-cerrar { background: rgba(255,255,255,0.12); color: #fff; border: 1px solid rgba(255,255,255,0.25); border-radius: 8px; font-size: 13px; padding: 7px 16px; display: flex; align-items: center; gap: 6px; text-decoration: none; transition: background 0.2s; }
    .btn-cerrar:hover { background: rgba(255,255,255,0.22); color: #fff; }
    .sidebar { width: 220px; min-height: calc(100vh - 56px); background: #fff; border-right: 0.5px solid #e2e8f0; padding: 24px 0; position: fixed; top: 56px; }
    .sidebar a { display: flex; align-items: center; gap: 10px; padding: 10px 24px; font-size: 14px; color: #4a5568; text-decoration: none; transition: background 0.15s; }
    .sidebar a:hover, .sidebar a.active { background: #f0fff4; color: #2e7d32; font-weight: 500; }
    .sidebar a i { font-size: 18px; }
    .main { margin-left: 220px; padding: 32px; }
    .stat-card { background: #fff; border-radius: 14px; padding: 24px; border: 0.5px solid #e2e8f0; box-shadow: 0 2px 12px rgba(46,125,50,0.06); }
    .stat-card .icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 12px; }
    .stat-card .numero { font-size: 28px; font-weight: 700; color: #1a2d5a; }
    .stat-card .etiqueta { font-size: 13px; color: #8a9ab5; margin-top: 2px; }
    .card-materia { background: #fff; border-radius: 14px; padding: 20px 24px; border: 0.5px solid #e2e8f0; box-shadow: 0 2px 12px rgba(46,125,50,0.06); display: flex; justify-content: space-between; align-items: center; }
    .badge-semestre { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; background: #e8f5e9; color: #2e7d32; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark">
  <div class="container-fluid px-0">
    <span class="navbar-brand-text"><i class="ti ti-school"></i> Sistema Académico</span>
    <div class="d-flex align-items-center gap-3">
      <span style="color:rgba(255,255,255,0.8); font-size:13px;">
        <i class="ti ti-user" style="font-size:15px; vertical-align:-2px"></i>
        <span th:text="${usuario.nombre + ' ' + usuario.apellido}"></span>
      </span>
      <a th:href="@{/logout}" class="btn-cerrar"><i class="ti ti-logout" style="font-size:15px"></i> Cerrar sesión</a>
    </div>
  </div>
</nav>

<div class="sidebar">
  <a th:href="@{/docente/inicio}" class="active"><i class="ti ti-layout-dashboard"></i> Inicio</a>
</div>

<div class="main">
  <h4 class="mb-1" style="color:#1a2d5a; font-weight:600">
    ¡Bienvenido, <span th:text="${usuario.nombre + ' ' + usuario.apellido}"></span>!
  </h4>
  <p class="text-muted mb-4" style="font-size:14px">Panel docente del sistema académico.</p>

  <div class="row g-3 mb-4">
    <div class="col-md-3 col-6">
      <div class="stat-card">
        <div class="icon" style="background:#e8f5e9"><i class="ti ti-book" style="color:#2e7d32"></i></div>
        <p class="numero" th:text="${totalMaterias}">0</p>
        <p class="etiqueta">Materias asignadas</p>
      </div>
    </div>
  </div>

  <h6 class="mb-3" style="font-weight:600; color:#1a2d5a">Mis materias</h6>

  <div class="row g-3">
    <div class="col-md-6" th:each="m : ${materias}">
      <div class="card-materia">
        <div>
          <p class="mb-1" style="font-weight:600; color:#1a2d5a; font-size:15px" th:text="${m.nombreMateria}"></p>
          <div class="d-flex gap-2 align-items-center">
            <span class="badge-semestre" th:text="'Semestre ' + ${m.semestre.numeroSemestre}"></span>
            <span style="font-size:12px; color:#8a9ab5" th:text="${m.carrera.nombreCarrera}"></span>
          </div>
        </div>
        <a th:href="@{/docente/materia/{id}/estudiantes(id=${m.idMateria})}"
           class="btn btn-sm" style="background:#2e7d32; color:#fff; border-radius:8px; font-size:13px; white-space:nowrap;">
          <i class="ti ti-users" style="font-size:14px; vertical-align:-2px"></i> Ver estudiantes
        </a>
      </div>
    </div>
    <div class="col-12" th:if="${#lists.isEmpty(materias)}">
      <div style="background:#fff; border-radius:14px; padding:40px; text-align:center; color:#8a9ab5; border:0.5px solid #e2e8f0;">
        <i class="ti ti-book-off" style="font-size:36px; display:block; margin-bottom:12px"></i>
        No tienes materias asignadas aún.
      </div>
    </div>
  </div>
</div>

</body>
</html>
