<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Login - Sistema Académico</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    body {
      background: #1e3c72;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    .card-login {
      width: 420px;
      border: none;
      border-radius: 20px;
      padding: 40px 36px;
      background: #ffffff;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: #1e3c72;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
    }

    .logo-icon i { color: #fff; font-size: 24px; }

    .titulo {
      font-size: 20px;
      font-weight: 600;
      color: #1a2d5a;
      margin-bottom: 4px;
    }

    .subtitulo {
      font-size: 13px;
      color: #8a9ab5;
      margin-bottom: 28px;
    }

    .form-label {
      font-size: 13px;
      font-weight: 500;
      color: #4a5568;
      margin-bottom: 6px;
    }

    .input-group-text {
      background: #f7f9fc;
      border-right: none;
      border-color: #dde2ec;
      color: #8a9ab5;
    }

    .form-control {
      border-left: none;
      border-color: #dde2ec;
      background: #f7f9fc;
      font-size: 14px;
      padding: 10px 14px;
    }

    .form-control:focus {
      border-color: #2a5298;
      box-shadow: 0 0 0 3px rgba(42, 82, 152, 0.12);
      background: #fff;
    }

    .input-group:focus-within .input-group-text {
      border-color: #2a5298;
      background: #fff;
    }

    .btn-login {
      width: 100%;
      border-radius: 10px;
      padding: 11px;
      font-size: 15px;
      font-weight: 500;
      background: #1e3c72;
      border: none;
      letter-spacing: 0.02em;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-login:hover { background: #2a5298; }
    .btn-login:active { transform: scale(0.98); }

    .alerta-error {
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .link-ayuda {
      font-size: 12px;
      color: #8a9ab5;
      text-align: center;
      margin-top: 14px;
    }

    .link-ayuda a {
      color: #2a5298;
      text-decoration: none;
    }
  </style>
</head>
<body>

<div class="card card-login">

  <div class="logo-icon">
    <i class="ti ti-school"></i>
  </div>
  <h2 class="titulo">Sistema Académico</h2>
  <p class="subtitulo">Ingrese sus credenciales para continuar</p>

  <div class="alerta-error" th:if="${param.error}"
       style="background:#fff0f0; border:1px solid #ffcccc; color:#c0392b;">
    <i class="ti ti-alert-circle" style="font-size:16px"></i>
    Usuario o contraseña incorrectos.
  </div>

  <div class="alerta-error" th:if="${param.logout}"
       style="background:#f0fff4; border:1px solid #b2dfdb; color:#1b5e20;">
    <i class="ti ti-circle-check" style="font-size:16px"></i>
    Sesión cerrada correctamente.
  </div>

  <form th:action="@{/login}" method="post">

    <div class="mb-3">
      <label class="form-label">Usuario</label>
      <div class="input-group">
        <span class="input-group-text">
          <i class="ti ti-user" style="font-size:16px"></i>
        </span>
        <input type="text" name="username" class="form-control"
               placeholder="Ingrese su usuario" required>
      </div>
    </div>

    <div class="mb-4">
      <label class="form-label">Contraseña</label>
      <div class="input-group">
        <span class="input-group-text">
          <i class="ti ti-lock" style="font-size:16px"></i>
        </span>
        <input type="password" name="password" class="form-control"
               placeholder="Ingrese su contraseña" required>
      </div>
    </div>

    <button type="submit" class="btn btn-primary btn-login">
      <i class="ti ti-login" style="font-size:16px; vertical-align:-2px; margin-right:6px"></i>
      Ingresar
    </button>

    <p class="link-ayuda">¿Problemas para ingresar? <a href="#">Contacte al administrador</a></p>

  </form>

</div>

</body>
</html>
