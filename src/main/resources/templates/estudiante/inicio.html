<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Estudiante - Inicio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    body { background: #f4f6fb; font-family: 'Segoe UI', Arial, sans-serif; }
    .navbar { background: #e65100; padding: 12px 24px; box-shadow: 0 2px 12px rgba(230,81,0,0.18); }
    .navbar-brand-text { color: #fff; font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
    .navbar-brand-text i { font-size: 22px; }
    .btn-cerrar { background: rgba(255,255,255,0.12); color: #fff; border: 1px solid rgba(255,255,255,0.25); border-radius: 8px; font-size: 13px; padding: 7px 16px; display: flex; align-items: center; gap: 6px; text-decoration: none; transition: background 0.2s; }
    .btn-cerrar:hover { background: rgba(255,255,255,0.22); color: #fff; }
    .sidebar { width: 220px; min-height: calc(100vh - 56px); background: #fff; border-right: 0.5px solid #e2e8f0; padding: 24px 0; position: fixed; top: 56px; }
    .sidebar a { display: flex; align-items: center; gap: 10px; padding: 10px 24px; font-size: 14px; color: #4a5568; text-decoration: none; transition: background 0.15s; }
    .sidebar a:hover, .sidebar a.active { background: #fff3e0; color: #e65100; font-weight: 500; }
    .sidebar a i { font-size: 18px; }
    .main { margin-left: 220px; padding: 32px; }
    .stat-card { background: #fff; border-radius: 14px; padding: 24px; border: 0.5px solid #e2e8f0; box-shadow: 0 2px 12px rgba(230,81,0,0.06); }
    .stat-card .icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 12px; }
    .stat-card .numero { font-size: 28px; font-weight: 700; color: #1a2d5a; }
    .stat-card .etiqueta { font-size: 13px; color: #8a9ab5; margin-top: 2px; }
    .perfil-card { background: #fff; border-radius: 14px; padding: 28px; border: 0.5px solid #e2e8f0; box-shadow: 0 2px 12px rgba(230,81,0,0.06); }
    .avatar-circle { width: 60px; height: 60px; background: #fff3e0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; color: #e65100; flex-shrink: 0; }
    .info-item .label { font-size: 11px; color: #8a9ab5; margin-bottom: 2px; }
    .info-item .valor { font-size: 14px; font-weight: 500; color: #1a2d5a; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark">
  <div class="container-fluid px-0">
    <span class="navbar-brand-text"><i class="ti ti-school"></i> Sistema Académico</span>
    <div class="d-flex align-items-center gap-3">
      <span style="color:rgba(255,255,255,0.8); font-size:13px;">
        <i class="ti ti-user" style="font-size:15px; vertical-align:-2px"></i>
        <span th:text="${usuario.nombre + ' ' + usuario.apellido}"></span>
      </span>
      <a th:href="@{/logout}" class="btn-cerrar"><i class="ti ti-logout" style="font-size:15px"></i> Cerrar sesión</a>
    </div>
  </div>
</nav>

<div class="sidebar">
  <a th:href="@{/estudiante/inicio}" class="active"><i class="ti ti-layout-dashboard"></i> Inicio</a>
  <a th:href="@{/estudiante/materias}"><i class="ti ti-book"></i> Mis materias</a>
</div>

<div class="main">
  <h4 class="mb-1" style="color:#1a2d5a; font-weight:600">
    ¡Bienvenido, <span th:text="${usuario.nombre + ' ' + usuario.apellido}"></span>!
  </h4>
  <p class="text-muted mb-4" style="font-size:14px">Panel estudiantil del sistema académico.</p>

  <div class="row g-3 mb-4">
    <div class="col-md-4 col-6">
      <div class="stat-card">
        <div class="icon" style="background:#fff3e0"><i class="ti ti-book" style="color:#e65100"></i></div>
        <p class="numero" th:text="${totalMaterias}">0</p>
        <p class="etiqueta">Materias matriculadas</p>
      </div>
    </div>
    <div class="col-md-4 col-6">
      <div class="stat-card">
        <div class="icon" style="background:#e8f0fe"><i class="ti ti-chart-bar" style="color:#1e3c72"></i></div>
        <p class="numero" th:text="${promedioGeneral}">0.0</p>
        <p class="etiqueta">Promedio general</p>
      </div>
    </div>
    <div class="col-md-4 col-6">
      <div class="stat-card">
        <div class="icon" style="background:#e8f5e9"><i class="ti ti-calendar" style="color:#2e7d32"></i></div>
        <p class="numero" th:text="${estudiante.semestre.numeroSemestre}">0</p>
        <p class="etiqueta">Semestre actual</p>
      </div>
    </div>
  </div>

  <div class="perfil-card">
    <h6 class="mb-4" style="font-weight:600; color:#1a2d5a">Perfil académico</h6>
    <div class="d-flex align-items-center gap-3 mb-4">
      <div class="avatar-circle">
        <span th:text="${#strings.toUpperCase(#strings.substring(usuario.nombre,0,1))}
                      + ${#strings.toUpperCase(#strings.substring(usuario.apellido,0,1))}"></span>
      </div>
      <div>
        <p class="mb-0" style="font-weight:600; font-size:16px; color:#1a2d5a"
           th:text="${usuario.nombre + ' ' + usuario.apellido}"></p>
        <p class="mb-0" style="font-size:13px; color:#8a9ab5" th:text="${usuario.correo}"></p>
      </div>
    </div>
    <div class="row g-3">
      <div class="col-md-3 col-6">
        <div class="info-item">
          <p class="label">Cédula</p>
          <p class="valor" th:text="${usuario.cedula}"></p>
        </div>
      </div>
      <div class="col-md-3 col-6">
        <div class="info-item">
          <p class="label">Username</p>
          <p class="valor" th:text="${usuario.username}"></p>
        </div>
      </div>
      <div class="col-md-3 col-6">
        <div class="info-item">
          <p class="label">Carrera</p>
          <p class="valor" th:text="${estudiante.carrera.nombreCarrera}"></p>
        </div>
      </div>
      <div class="col-md-3 col-6">
        <div class="info-item">
          <p class="label">Semestre</p>
          <p class="valor" th:text="${estudiante.semestre.numeroSemestre}"></p>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
