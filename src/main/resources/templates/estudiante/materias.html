<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Estudiante - Materias</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    body { background: #f4f6fb; font-family: 'Segoe UI', Arial, sans-serif; }
    .navbar { background: #e65100; padding: 12px 24px; box-shadow: 0 2px 12px rgba(230,81,0,0.18); }
    .navbar-brand-text { color: #fff; font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
    .navbar-brand-text i { font-size: 22px; }
    .btn-cerrar { background: rgba(255,255,255,0.12); color: #fff; border: 1px solid rgba(255,255,255,0.25); border-radius: 8px; font-size: 13px; padding: 7px 16px; display: flex; align-items: center; gap: 6px; text-decoration: none; }
    .sidebar { width: 220px; min-height: calc(100vh - 56px); background: #fff; border-right: 0.5px solid #e2e8f0; padding: 24px 0; position: fixed; top: 56px; }
    .sidebar a { display: flex; align-items: center; gap: 10px; padding: 10px 24px; font-size: 14px; color: #4a5568; text-decoration: none; transition: background 0.15s; }
    .sidebar a:hover, .sidebar a.active { background: #fff3e0; color: #e65100; font-weight: 500; }
    .sidebar a i { font-size: 18px; }
    .main { margin-left: 220px; padding: 32px; }
    .card-materia { background: #fff; border-radius: 14px; padding: 20px 24px; border: 0.5px solid #e2e8f0; box-shadow: 0 2px 12px rgba(230,81,0,0.06); display: flex; justify-content: space-between; align-items: center; }
    .badge-semestre { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; background: #fff3e0; color: #e65100; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark">
  <div class="container-fluid px-0">
    <span class="navbar-brand-text"><i class="ti ti-school"></i> Sistema Académico</span>
    <a th:href="@{/logout}" class="btn-cerrar"><i class="ti ti-logout" style="font-size:15px"></i> Cerrar sesión</a>
  </div>
</nav>

<div class="sidebar">
  <a th:href="@{/estudiante/inicio}"><i class="ti ti-layout-dashboard"></i> Inicio</a>
  <a th:href="@{/estudiante/materias}" class="active"><i class="ti ti-book"></i> Mis materias</a>
</div>

<div class="main">
  <h4 class="mb-1" style="color:#1a2d5a; font-weight:600">Mis materias</h4>
  <p class="text-muted mb-4" style="font-size:14px">Consulta tus materias y notas por corte.</p>

  <div class="row g-3">
    <div class="col-md-6" th:each="m : ${materias}">
      <div class="card-materia">
        <div>
          <p class="mb-1" style="font-weight:600; color:#1a2d5a; font-size:15px"
             th:text="${m.nombreMateria}"></p>
          <div class="d-flex gap-2 align-items-center">
            <span class="badge-semestre" th:text="'Semestre ' + ${m.semestre.numeroSemestre}"></span>
            <span style="font-size:12px; color:#8a9ab5" th:text="${m.carrera.nombreCarrera}"></span>
          </div>
        </div>
        <a th:href="@{/estudiante/materia/{id}/notas(id=${m.idMateria})}"
           class="btn btn-sm" style="background:#e65100; color:#fff; border-radius:8px; font-size:13px; white-space:nowrap;">
          <i class="ti ti-chart-bar" style="font-size:14px; vertical-align:-2px"></i> Ver notas
        </a>
      </div>
    </div>
    <div class="col-12" th:if="${#lists.isEmpty(materias)}">
      <div style="background:#fff; border-radius:14px; padding:40px; text-align:center; color:#8a9ab5; border:0.5px solid #e2e8f0;">
        <i class="ti ti-book-off" style="font-size:36px; display:block; margin-bottom:12px"></i>
        No tienes materias matriculadas aún.
      </div>
    </div>
  </div>
</div>

</body>
</html>
